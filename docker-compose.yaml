services:
  postgres:
    image: postgres:17-alpine
    container_name: faq-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: faq
      POSTGRES_USER: faq_user
      POSTGRES_PASSWORD: faq_9876
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # healthcheck:
    #   test: ["CMD-SHELL", "pg_isready -U faq_user -d faq"]
    #   interval: 5s
    #   timeout: 5s
    #   retries: 5

volumes:
  postgres_data:
